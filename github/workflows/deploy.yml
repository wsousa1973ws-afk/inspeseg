name: Deploy Edge Function
on:
  push:
    branches: [main]
    paths:
      - supabase/functions/**
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy sheets-sync
        run: supabase functions deploy sheets-sync --project-ref hecwzhkielcgolgsrlvc --no-verify-jwt --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
